services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: observer
      POSTGRES_USER: observer
      POSTGRES_PASSWORD: observer
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observer"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  engine:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - engine-data:/data
      - ${HOME}/.observer/frames:/data/frames:ro
      - ./sources/builtin:/app/sources/builtin:ro
      - ./src:/app/src:ro
    environment:
      - SOURCES_DIR=/app/sources/builtin
      - DATABASE_URL=postgresql+asyncpg://observer:observer@db:5432/observer
      - DATABASE_URL_SYNC=postgresql+psycopg://observer:observer@db:5432/observer
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - FRAMES_BASE_DIR=/data/frames
      - CLAUDE_CODE_STREAM_CLOSE_TIMEOUT=300
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/engine/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "5174:80"
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  engine-data:
  pgdata:

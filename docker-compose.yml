services:
  engine:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - engine-data:/data
      - ${HOME}/.bisimulator/frames:/data/frames:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/data/engine.db
      - FRAMES_BASE_DIR=/data/frames
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/engine/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "5174:80"
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  engine-data:

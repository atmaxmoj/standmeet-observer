[project]
name = "bisimulator"
version = "0.1.0"
description = "Behavioral distillation engine"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "anthropic>=0.52",
    "aiosqlite>=0.21",
    "pydantic>=2.11",
    "pydantic-settings>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

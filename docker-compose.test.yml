name: bisimulator-test

services:
  engine-test:
    build: .
    volumes:
      - engine-test-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-fake-test-key}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - DB_PATH=/data/engine.db
      - FRAMES_BASE_DIR=/data/frames
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/engine/status')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  playwright:
    build:
      context: .
      dockerfile: web/Dockerfile.test
    depends_on:
      engine-test:
        condition: service_healthy
    environment:
      - VITE_API_TARGET=http://engine-test:5000
      - PW_BASE_URL=http://localhost:5173
    command: >
      sh -c "
        npx vite --host 0.0.0.0 --port 5173 &
        sleep 3 &&
        npx playwright test
      "

volumes:
  engine-test-data:

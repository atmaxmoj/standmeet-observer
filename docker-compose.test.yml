name: observer-test

services:
  db-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: observer_test
      POSTGRES_USER: observer
      POSTGRES_PASSWORD: observer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observer -d observer_test"]
      interval: 3s
      timeout: 2s
      retries: 5

  pytest-sources:
    build:
      context: sources/framework
      dockerfile: Dockerfile.test

  pytest-unit:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - ANTHROPIC_API_KEY=sk-fake-test-key
    command: ["uv", "run", "pytest", "tests_unit/", "-q", "--tb=short"]

  vitest:
    build:
      context: web
      dockerfile: Dockerfile.unit

  engine-test:
    build: .
    volumes:
      - engine-test-data:/data
      - ./sources/builtin:/app/sources/builtin:ro
    environment:
      - SOURCES_DIR=/app/sources/builtin
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - DATABASE_URL=postgresql+asyncpg://observer:observer@db-test:5432/observer_test
      - DATABASE_URL_SYNC=postgresql+psycopg://observer:observer@db-test:5432/observer_test
      - HUEY_DB_DIR=/data
      - FRAMES_BASE_DIR=/data/frames
    depends_on:
      db-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/engine/status')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  pytest:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - TEST_PG_HOST=db-test
      - TEST_PG_PORT=5432
      - TEST_PG_DB=observer_test
      - ANTHROPIC_API_KEY=sk-fake-test-key
      - HUEY_DB_DIR=/tmp
    depends_on:
      db-test:
        condition: service_healthy

  playwright:
    build:
      context: web
      dockerfile: Dockerfile.test
    depends_on:
      engine-test:
        condition: service_healthy
    environment:
      - VITE_API_TARGET=http://engine-test:5000
      - PW_BASE_URL=http://localhost:5173
    command: >
      sh -c "
        npx vite --host 0.0.0.0 --port 5173 &
        sleep 3 &&
        npx playwright test
      "

volumes:
  engine-test-data:

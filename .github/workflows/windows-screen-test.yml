name: Windows Screen Source Tests

on:
  push:
    paths:
      - "sources/builtin/screen/**"
      - "sources/framework/**"
      - ".github/workflows/windows-screen-test.yml"
  pull_request:
    paths:
      - "sources/builtin/screen/**"
      - "sources/framework/**"
  workflow_dispatch: # manual trigger

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install screen source dependencies
        working-directory: sources/builtin/screen
        run: uv sync --extra test

      - name: Run Windows capture tests
        working-directory: sources/builtin/screen
        run: uv run pytest tests/test_windows_capture.py -v -s --tb=short
